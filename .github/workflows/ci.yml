# CI placeholder (S0). Real pipeline (DB service, migrations, e2e) lands with S1+.
name: zaggel-core CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
